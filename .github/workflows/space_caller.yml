name: Space Caller – Fire space-trigger via PAT

# -----------------------------------------------------------------------
# PURPOSE
# This workflow is invoked by the Perplexity Space scheduled task.
# It uses SPACE_TRIGGER_PAT (repo scope only) to POST a repository_dispatch
# event to THIS repo, which wakes up dispatch_trigger.yml → update_data.yml.
#
# The Space task calls:
#   POST https://api.github.com/repos/sujaysoni/equity-strategist-dashboard/dispatches
#   Authorization: Bearer <SPACE_TRIGGER_PAT>
#   Body: {"event_type": "space-trigger"}
#
# That fires THIS workflow via repository_dispatch → space-trigger.
# This workflow then re-fires refresh-analysis which update_data.yml handles.
# -----------------------------------------------------------------------

on:
  repository_dispatch:
    types: [space-trigger]

  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'Manual test'

permissions:
  contents: write

jobs:
  relay:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Log
        run: |
          echo "Space Caller triggered at $(date -u)"
          echo "Event: ${{ github.event_name }}"

      - name: Fire refresh-analysis dispatch
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SPACE_TRIGGER_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/sujaysoni/equity-strategist-dashboard/dispatches" \
            -d '{"event_type":"refresh-analysis","client_payload":{"source":"perplexity-space"}}'
          echo "refresh-analysis fired — update_data.yml will run the analysis."
