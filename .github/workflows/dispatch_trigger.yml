name: Dispatch – Trigger Recommendation Update

# -----------------------------------------------------------------------
# PURPOSE
# This workflow exists solely to TRIGGER update_data.yml via
# repository_dispatch.  It is the entry-point for:
#   1. The Perplexity Space scheduled task (calls this via PAT)
#   2. Any external webhook / cron service
#   3. A manual fallback trigger from the GitHub UI
#
# It does NOT run analysis itself — it fires a 'refresh-analysis'
# repository_dispatch event which update_data.yml listens for.
#
# WHY repository_dispatch and not workflow_dispatch directly?
# workflow_dispatch requires a PAT with 'workflow' scope — very broad.
# repository_dispatch only requires 'repo' scope — much narrower and safer.
# The Space PAT only needs: repo (contents:read+write) — no workflow scope.
# -----------------------------------------------------------------------

on:
  # ── Scheduled fallback (backup if Space task misses) ──────────────────
  schedule:
    - cron: '5 14 * * 1-5'   # 10:05 AM EDT (UTC-4, Mar–Nov)
    - cron: '5 15 * * 1-5'   # 10:05 AM EST (UTC-5, Nov–Mar)

  # ── Called by the Space scheduled task via API ────────────────────────
  # POST /repos/sujaysoni/equity-strategist-dashboard/dispatches
  # Body: {"event_type": "space-trigger"}
  repository_dispatch:
    types: [space-trigger]

  # ── Manual fallback from GitHub UI ───────────────────────────────────
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Log trigger source
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Time (UTC):   $(date -u)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Reason: ${{ github.event.inputs.reason }}"
          fi

      # ----------------------------------------------------------------
      # Check if update_data.yml already ran within the last 3 hours
      # by reading recommendations.json directly from the repo.
      # If it ran recently, skip firing to avoid duplicate runs.
      # ----------------------------------------------------------------
      - name: Check for recent run (dedup guard)
        id: dedup
        run: |
          set -e
          # Fetch recommendations.json from raw GitHub content
          HTTP=$(curl -s -o /tmp/reco.json -w "%{http_code}" \
            "https://raw.githubusercontent.com/sujaysoni/equity-strategist-dashboard/main/public/recommendations.json")

          if [ "$HTTP" != "200" ]; then
            echo "Could not fetch recommendations.json (HTTP $HTTP) — will trigger."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GEN=$(grep -oP '"generated_at"\s*:\s*"\K[^"]+' /tmp/reco.json | head -1)
          if [ -z "$GEN" ]; then
            echo "No generated_at found — will trigger."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GEN_EPOCH=$(date -d "$GEN" +%s 2>/dev/null || echo 0)
          NOW_EPOCH=$(date +%s)
          AGE=$(( NOW_EPOCH - GEN_EPOCH ))
          echo "Last run: $GEN  (${AGE}s / $(( AGE/60 ))m ago)"

          if [ "$AGE" -lt 10800 ]; then
            echo "Already ran within 3 hours — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Last run was >3 hours ago — will trigger."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------------------------------
      # Fire repository_dispatch → update_data.yml picks it up
      # Uses GITHUB_TOKEN (contents:write already granted above)
      # ----------------------------------------------------------------
      - name: Fire repository_dispatch → refresh-analysis
        if: steps.dedup.outputs.skip != 'true'
        run: |
          echo "Firing repository_dispatch event: refresh-analysis"
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type":"refresh-analysis","client_payload":{"source":"dispatch_trigger.yml"}}'
          echo "Done — update_data.yml will now start the analysis job."

      - name: Skipped (dedup)
        if: steps.dedup.outputs.skip == 'true'
        run: echo "Skipped — recommendations already fresh. No duplicate run needed."
