name: Live Price Feed

on:
  schedule:
    # Every 15 min, Mon–Fri, 9:30 AM – 4:15 PM ET (13:30–20:15 UTC)
    - cron: '30 13 * * 1-5'
    - cron: '45 13 * * 1-5'
    - cron: '0 14-20 * * 1-5'
    - cron: '15 14-20 * * 1-5'
    - cron: '30 14-20 * * 1-5'
    - cron: '45 14-20 * * 1-5'
  workflow_dispatch:   # allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch live prices
        run: python backend/fetch_prices.py

      - name: Commit prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prices.json
          git diff --cached --quiet || git commit -m "chore: update live prices [skip ci]"
          git push
