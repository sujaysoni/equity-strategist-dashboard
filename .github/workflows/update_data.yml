name: Update Stock Recommendations

on:
  schedule:
    - cron: '0 14 * * 1-5'      # 14:00 UTC = 10:00 AM ET (EDT), weekdays
  repository_dispatch:
    types: [refresh-analysis]
  workflow_dispatch:

jobs:
  analyze:
    runs-on:         ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh TSX ticker seed from TMX API
        run: python backend/fetch_tsx_tickers.py

      - name: Run full universe analysis
        env:
          POLYGON_API_KEY:   ${{ secrets.POLYGON_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python backend/analyze_stocks.py

      - name: Commit updated recommendations & seed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add public/recommendations.json backend/tsx_tickers_cache.txt
          git diff --staged --quiet || git commit -m "chore: update recommendations $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
