name: Update Stock Recommendations

on:
  schedule:
    # Two cron slots so GitHub scheduler throttling can't miss both.
    # GitHub runs crons in UTC; ET = UTC-4 in summer (EDT).
    - cron: '0 13 * * 1-5'   # 09:00 AM EDT  — early buffer run
    - cron: '0 14 * * 1-5'   # 10:00 AM EDT  — primary target
  repository_dispatch:
    types: [refresh-analysis]
  workflow_dispatch:           # manual trigger from GitHub UI or API
  workflow_call:               # allows deploy.yml to call this as a sub-workflow

jobs:
  analyze:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so the push step has a clean base
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxml2-dev libxslt-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          python -c "import yfinance; print('yfinance', yfinance.__version__)"
          python -c "import pandas;   print('pandas',   pandas.__version__)"

      # ------------------------------------------------------------------ #
      # Refresh ticker caches BEFORE analysis so the universe is current.
      # fetch_nyse_tickers.py fetches BOTH NYSE and NASDAQ tickers into
      # nyse_tickers_cache.txt/json — so analyze_stocks.py sees all US stocks.
      # continue-on-error: stale cache > no analysis.
      # ------------------------------------------------------------------ #
      - name: Refresh TSX / TSXV ticker cache
        run: python backend/fetch_tsx_tickers.py
        continue-on-error: true

      - name: Refresh NYSE + NASDAQ ticker cache
        run: python backend/fetch_nyse_tickers.py
        continue-on-error: true

      # ------------------------------------------------------------------ #
      # Core analysis
      # ------------------------------------------------------------------ #
      - name: Run analysis
        env:
          POLYGON_API_KEY:   ${{ secrets.POLYGON_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python backend/analyze_stocks.py

      # ------------------------------------------------------------------ #
      # Commit all outputs — push triggers deploy.yml automatically
      # ------------------------------------------------------------------ #
      - name: Commit & push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add public/recommendations.json
          git add backend/tsx_tickers_cache.txt    || true
          git add backend/tsx_tickers_cache.json   || true
          git add backend/nyse_tickers_cache.txt    || true
          git add backend/nyse_tickers_cache.json   || true
          git add backend/nasdaq_tickers_cache.json || true
          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit — data unchanged since last run."
          else
            git commit -m "chore: update recommendations $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Pushed — deploy.yml will rebuild the site automatically."
          fi
