name: Update Stock Recommendations

on:
  schedule:
    - cron: '0 14 * * 1-5'      # 10:00 AM ET weekdays
  repository_dispatch:
    types: [refresh-analysis]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxml2-dev libxslt-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt
          python -c "import yfinance; print('yfinance', yfinance.__version__)"
          python -c "import pandas; print('pandas', pandas.__version__)"

      # ------------------------------------------------------------------ #
      # Refresh ticker caches before analysis so the universe is current.
      # Both steps use continue-on-error so a source outage never blocks
      # the analysis run – stale caches are better than no analysis at all.
      # ------------------------------------------------------------------ #
      - name: Refresh TSX / TSXV ticker cache
        run: python backend/fetch_tsx_tickers.py
        continue-on-error: true

      - name: Refresh NYSE ticker cache
        run: python backend/fetch_nyse_tickers.py
        continue-on-error: true

      # ------------------------------------------------------------------ #
      # Core analysis
      # ------------------------------------------------------------------ #
      - name: Run analysis
        env:
          POLYGON_API_KEY:   ${{ secrets.POLYGON_API_KEY }}
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: python backend/analyze_stocks.py

      # ------------------------------------------------------------------ #
      # Commit all outputs in one push
      # ------------------------------------------------------------------ #
      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add public/recommendations.json
          git add backend/tsx_tickers_cache.txt  || true
          git add backend/tsx_tickers_cache.json || true
          git add backend/nyse_tickers_cache.txt  || true
          git add backend/nyse_tickers_cache.json || true
          git diff --staged --quiet || \
            git commit -m "chore: update recommendations $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
